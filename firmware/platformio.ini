; PlatformIO Configuration for SynTee
; Teensy 4.1 synthesizer

[env:teensy41]
platform = teensy
board = teensy41
framework = arduino

; Audio library is included with Teensyduino core
lib_deps =
    ssilverman/QNEthernet@^0.29.0

build_flags =
    -DTEENSYDUINO
    -DARDUINO_TEENSY41
    -DF_CPU=600000000

; Upload via Teensy Loader
upload_protocol = teensy-cli

; Serial monitor
monitor_speed = 115200
